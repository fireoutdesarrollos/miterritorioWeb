name: Despliegue con [Dispara]
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    if: contains(github.event.head_commit.message, '[Dispara]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TERRITORIOS_A3BA5 }}'
          channelId: live
          projectId: territorios-a3ba5